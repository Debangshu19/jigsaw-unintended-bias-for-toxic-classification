<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>Raven</title>
  </head>
  <body>
    <main class="popup">
      <header>
        <span class="mark">R</span>
        <div>
          <h1>Raven</h1>
          <p id="api-state">Checking API</p>
        </div>
      </header>

      <section class="stats">
        <div>
          <strong id="scanned">0</strong>
          <span>Scanned</span>
        </div>
        <div>
          <strong id="flagged">0</strong>
          <span>Review</span>
        </div>
      </section>

      <button id="scan" type="button">Scan this page</button>
      <p id="source" class="source">No scan yet</p>

      <section class="manual-check">
        <label for="quick-text">Test a comment</label>
        <form id="quick-form">
          <input id="quick-text" type="text" placeholder="Type and press Enter" autocomplete="off" />
          <button id="quick-scan" type="submit">Check</button>
        </form>
        <p id="quick-result" class="quick-result">Waiting for input</p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
