<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>Raven</title>
  </head>
  <body>
    <main class="popup">
      <header>
        <img class="mark" src="icons/raven-48.png" alt="Raven" />
        <div>
          <h1>Raven</h1>
          <p id="api-state">Checking engine…</p>
        </div>
      </header>

      <section class="stats">
        <div>
          <strong id="scanned">0</strong>
          <span>Scanned</span>
        </div>
        <div>
          <strong id="flagged">0</strong>
          <span>Toxic</span>
        </div>
      </section>

      <p class="auto">Raven scans every post automatically as you scroll.</p>

      <div class="legend">
        <span class="dot safe"></span>Safe
        <span class="dot borderline"></span>Borderline
        <span class="dot toxic"></span>Toxic
      </div>

      <button id="rescan" type="button">Rescan now</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
