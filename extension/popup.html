<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>Raven</title>
  </head>
  <body>
    <main class="popup">
      <header>
        <span class="mark">R</span>
        <div>
          <h1>Raven</h1>
          <p id="api-state">Checking API</p>
        </div>
      </header>

      <section class="stats">
        <div>
          <strong id="scanned">0</strong>
          <span>Scanned</span>
        </div>
        <div>
          <strong id="flagged">0</strong>
          <span>Review</span>
        </div>
      </section>

      <button id="scan" type="button">Scan this page</button>
      <p id="source" class="source">No scan yet</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
